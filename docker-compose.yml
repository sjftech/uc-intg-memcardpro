services:
  uc-intg-memcardpro:
    build: .
    container_name: uc-intg-memcardpro
    network_mode: host
    volumes:
      - memcardpro-config:/data
    environment:
      - UC_CONFIG_HOME=/data
      - UC_INTEGRATION_HTTP_PORT=9097
      - UC_INTEGRATION_INTERFACE=0.0.0.0
      - PYTHONPATH=/app
    restart: unless-stopped

volumes:
  memcardpro-config:
