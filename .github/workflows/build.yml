name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build aarch64 binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fix workspace permissions
        run: chmod -R 777 .

      - name: Build with PyInstaller (aarch64)
        run: |
          docker run --rm \
            --platform=linux/arm64 \
            -v "$PWD":/workspace \
            docker.io/unfoldedcircle/r2-pyinstaller:3.11.13 \
            bash -c \
              "cd /workspace && \
               python -m pip install -r requirements.txt && \
               pyinstaller --clean --onedir --name intg-memcardpro \
                 --collect-all zeroconf \
                 intg-memcardpro/driver.py"

      - name: Package tar.gz
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mkdir -p artifacts/bin
          cp -r dist/intg-memcardpro/* artifacts/bin/
          mv artifacts/bin/intg-memcardpro artifacts/bin/driver
          cp driver.json artifacts/
          tar czvf uc-intg-memcardpro-${VERSION}-aarch64.tar.gz -C artifacts .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uc-intg-memcardpro-aarch64
          path: "uc-intg-memcardpro-*-aarch64.tar.gz"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "uc-intg-memcardpro-*-aarch64.tar.gz"
          generate_release_notes: true
